name: Apply Audio Media MCP V2

on:
  pull_request:
    branches:
      - feat/mcp-integration-v1
  push:
    branches:
      - feat/audio-media-mcp-v2

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/audio-media-mcp-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Repair generated patch syntax
        run: node scripts/fix-audio-generator-syntax.cjs
      - name: Apply deterministic integration patch
        id: patch
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply-audio-media-mcp-v2.cjs 2>&1 | tee audio-patch.log
      - name: Upload patch diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audio-patch-diagnostics-${{ github.run_id }}
          path: audio-patch.log
          if-no-files-found: error
          retention-days: 3
      - name: Refresh lockfile
        run: npm install --package-lock-only
      - name: Commit generated integration
        run: |
          git checkout -- scripts/apply-audio-media-mcp-v2.cjs
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src electron package.json package-lock.json .github/workflows/ci.yml
          git commit -m "feat: wire audio timeline and MCP authoring V2"
          git push origin HEAD:feat/audio-media-mcp-v2
