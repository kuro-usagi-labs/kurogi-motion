name: Apply MCP Integration

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - feat/mcp-integration-v1

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/mcp-integration-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install supported MCP SDK
        run: npm install --save @modelcontextprotocol/sdk@1.29.0 zod@^4
      - name: Apply deterministic integration patch
        run: node scripts/apply-mcp-integration.cjs
      - name: Commit MCP integration
        run: |
          git checkout -- .github/workflows/ci.yml
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/main.cjs electron/preload.cjs src/vite-env.d.ts src/App.tsx src/app/Editor.tsx src/editor/EditorMenuBar.tsx src/main.tsx package.json package-lock.json
          git commit -m "feat: wire MCP server into Electron and editor"
          git push origin HEAD:feat/mcp-integration-v1
