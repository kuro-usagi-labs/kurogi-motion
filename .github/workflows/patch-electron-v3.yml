name: Patch Electron v3

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-electron-v3.cjs
      - .github/workflows/patch-electron-v3.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
      - run: node scripts/patch-electron-v3.cjs
      - shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add electron/main.cjs
          git commit -m "Add MOV alpha and native project file dialogs"
          git push origin HEAD:feature/prd-foundation-remotion
