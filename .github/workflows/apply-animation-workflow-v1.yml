name: Apply Animation Workflow V1

on:
  push:
    branches:
      - feat/animation-workflow-v1
    paths:
      - scripts/cleanup-animation-workflow-integration.cjs
      - .github/workflows/apply-animation-workflow-v1.yml
  pull_request:
    branches:
      - main
    paths:
      - scripts/cleanup-animation-workflow-integration.cjs
      - .github/workflows/apply-animation-workflow-v1.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == '' || github.head_ref == 'feat/animation-workflow-v1'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/animation-workflow-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Clean generated integration
        run: node scripts/cleanup-animation-workflow-integration.cjs
      - name: Commit cleanup
        run: |
          if git diff --quiet -- src/core/project.ts; then
            echo "Integration is already clean."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/project.ts
          git commit -m "fix: deduplicate animation migration helpers"
          git push origin HEAD:feat/animation-workflow-v1
