name: CI

on:
  push:
    branches:
      - main
      - feat/**
  pull_request:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Commit generated lockfile
        if: github.event_name == 'pull_request' && github.head_ref == 'feat/pixijs-editor-foundation' && github.event.pull_request.head.repo.full_name == github.repository
        run: |
          if [ -n "$(git status --porcelain -- package-lock.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add package-lock.json
            git commit -m "chore: update dependency lockfile [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
      - run: npm run test:run
      - name: Run build
        id: build
        continue-on-error: true
        run: npm run build 2>&1 | tee build.log
      - name: Upload validation outputs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-outputs
          path: |
            build.log
            package-lock.json
      - name: Enforce build result
        if: steps.build.outcome != 'success'
        run: exit 1
