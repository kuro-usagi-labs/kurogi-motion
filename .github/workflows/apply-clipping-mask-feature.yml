name: Apply Clipping Mask Feature

on:
  push:
    branches:
      - feat/layer-context-clipping-mask

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/layer-context-clipping-mask
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply clipping mask feature
        run: node scripts/apply-clipping-mask-feature.cjs
      - name: Commit product changes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/core/designTools.ts src/core/project.ts src/renderer/designStyles.ts src/MotionComposition.tsx src/editor/MultiSceneCanvasStage.tsx src/app/Editor.tsx src/main.tsx package.json .github/workflows/ci.yml
          if git diff --cached --quiet; then
            echo "No product changes to commit"
            exit 0
          fi
          git commit -m "feat: add clipping masks and layer context menu"
          git pull --rebase origin feat/layer-context-clipping-mask
          git push origin HEAD:feat/layer-context-clipping-mask
