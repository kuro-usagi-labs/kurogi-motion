name: CI

on:
  push:
    branches:
      - feat/clipping-mask-context-menu
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  clipping-mask-diagnostic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/clipping-mask-context-menu
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply and capture feature patch
        shell: bash
        run: |
          set +e
          node scripts/apply-clipping-mask-feature.cjs > clipping-patch.log 2>&1
          status=$?
          {
            echo "exit_status=$status"
            echo "--- output ---"
            tail -100 clipping-patch.log
            echo "--- git status ---"
            git status --short
          } > clipping-patch-status.log
          exit 0
      - name: Upload patch diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: clipping-mask-patch-diagnostics-${{ github.run_id }}
          path: |
            clipping-patch.log
            clipping-patch-status.log
          if-no-files-found: error
          retention-days: 1
