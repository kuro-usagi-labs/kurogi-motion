name: Patch renderer correctness

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/fix-renderer.cjs

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
      - run: node scripts/fix-renderer.cjs
      - shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/MotionComposition.tsx src/core/evaluator.ts
          git commit -m "Keep transparent exports clean and directions consistent"
          git push origin HEAD:feature/prd-foundation-remotion
