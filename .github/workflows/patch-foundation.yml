name: Patch foundation

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-foundation.cjs

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion

      - name: Apply source patch
        run: node scripts/patch-foundation.cjs

      - name: Commit patched sources
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No source changes were needed."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/project.ts src/editor/Timeline.tsx
          git commit -m "Fix foundation type safety"
          git push origin HEAD:feature/prd-foundation-remotion
