name: Finish scalable project foundations

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/finish-foundation-v2.py
      - .github/workflows/finish-foundation-v2.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/finish-foundation-v2.py
      - .github/workflows/finish-foundation-v2.yml

permissions:
  contents: write

concurrency:
  group: finish-foundation-v2
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply completion patch
        run: python scripts/finish-foundation-v2.py
      - name: Install dependencies
        run: npm ci
      - name: Validate foundations
        run: |
          npm run audit:foundation-v2
          npm run typecheck
          npm run build
      - name: Commit source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/app/Editor.tsx scripts/audit-foundation-v2.mjs
          git commit -m "Complete asset storage, patch history, and draft recovery"
          git push origin HEAD:feature/prd-foundation-remotion
