name: CI

on:
  push:
    branches:
      - feat/clipping-mask-context-menu
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-clipping-mask:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/clipping-mask-context-menu
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply and capture feature patch
        shell: bash
        run: |
          set +e
          node scripts/apply-clipping-mask-feature.cjs > clipping-patch.log 2>&1
          status=$?
          mkdir -p scripts
          {
            echo "exit_status=$status"
            echo "--- output ---"
            tail -100 clipping-patch.log
            echo "--- git status ---"
            git status --short
          } > scripts/clipping-patch-status.log
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture clipping mask patch result"
          git pull --rebase origin feat/clipping-mask-context-menu
          git push origin HEAD:feat/clipping-mask-context-menu
