name: Apply True Opacity Fix

on:
  push:
    branches:
      - fix/true-100-opacity

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/true-100-opacity
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply evaluator fix
        run: node scripts/apply-true-opacity-fix.cjs
      - name: Commit product fix
        shell: bash
        run: |
          git checkout -- scripts/apply-true-opacity-fix.cjs
          if git diff --quiet; then
            echo "No opacity changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/evaluator.ts
          git commit -m "fix: make 100 percent opacity fully opaque"
          git pull --rebase origin fix/true-100-opacity
          git push origin HEAD:fix/true-100-opacity
