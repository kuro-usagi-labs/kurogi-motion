name: Patch timeline nullability

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/fix-timeline-null.cjs

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion

      - name: Apply source patch
        run: node scripts/fix-timeline-null.cjs

      - name: Commit patched source
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/editor/Timeline.tsx
          git commit -m "Narrow active timeline gesture"
          git push origin HEAD:feature/prd-foundation-remotion
