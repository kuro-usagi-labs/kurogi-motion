name: Apply Multi-scene Layout Fix

on:
  push:
    branches:
      - fix/blank-artboard-preview

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/blank-artboard-preview
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply deterministic patch
        run: node scripts/apply-multiscene-layout-fix.cjs
      - name: Commit generated layout fix
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/editor/MultiSceneCanvasStage.tsx
          git commit -m "fix: replace zero-sized multiscene transform shells"
          git push origin HEAD:fix/blank-artboard-preview
