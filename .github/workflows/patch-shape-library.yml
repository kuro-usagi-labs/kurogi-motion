name: Patch shape library and templates

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/patch-shape-library.py
      - scripts/fix-shape-audit.py
      - .github/workflows/patch-shape-library.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-shape-library.py
      - scripts/fix-shape-audit.py

permissions:
  contents: write

concurrency:
  group: patch-shape-library
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply shape and template patch
        run: |
          python scripts/patch-shape-library.py
          python scripts/fix-shape-audit.py
      - name: Install dependencies
        run: npm ci
      - name: Validate shape and template foundations
        shell: bash
        run: |
          set -o pipefail
          npm run audit:shapes 2>&1 | tee shape-patch.log
          npm run audit:templates 2>&1 | tee -a shape-patch.log
          npm run typecheck 2>&1 | tee -a shape-patch.log
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shape-patch-diagnostics-${{ github.run_id }}
          path: shape-patch.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Commit source patch
        run: |
          git restore .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/core/project.ts src/core/shapeLibrary.ts src/ui/ShapeIcon.tsx src/MotionComposition.tsx src/renderer/LayerEffects.tsx src/app/Editor.tsx src/core/templateLayout.ts src/core/templateCatalog.ts src/finalUx.css scripts/audit-shapes.mjs package.json
          git commit -m "Expand vector shapes and refine template accents"
          git push origin HEAD:feature/prd-foundation-remotion
