name: Apply scalable project foundations

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/apply-foundation-v2.py
      - scripts/fix-foundation-v2-await.py
      - scripts/publish-foundation-v2.mjs
      - .github/workflows/apply-foundation-v2.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/apply-foundation-v2.py
      - scripts/fix-foundation-v2-await.py
      - scripts/publish-foundation-v2.mjs
      - .github/workflows/apply-foundation-v2.yml

permissions:
  contents: write

concurrency:
  group: apply-foundation-v2
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply foundation migration
        run: |
          python scripts/apply-foundation-v2.py
          python scripts/fix-foundation-v2-await.py
      - name: Install dependencies
        run: npm ci
      - name: Validate foundations
        shell: bash
        run: |
          set -o pipefail
          npm run audit:foundation-v2 2>&1 | tee foundation-v2.log
          npm run typecheck 2>&1 | tee -a foundation-v2.log
          npm run build 2>&1 | tee -a foundation-v2.log
      - name: Upload diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: foundation-v2-diagnostics-${{ github.run_id }}
          path: foundation-v2.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Publish implementation atomically
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/publish-foundation-v2.mjs
