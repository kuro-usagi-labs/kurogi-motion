name: Apply editor UX fixes v4

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/apply-ux-fixes-v4.cjs
      - .github/workflows/apply-ux-fixes-v4.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
      - run: node scripts/apply-ux-fixes-v4.cjs
      - shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/DashboardV3.tsx src/app/Editor.tsx src/core/project.ts src/core/templateCatalog.ts src/editor/InspectorV2.tsx src/polishV3.css src/ui/Icon.tsx
          git commit -m "Fix canvas zoom, layer reorder and template presentation"
          git push origin HEAD:feature/prd-foundation-remotion
