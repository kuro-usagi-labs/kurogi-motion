name: Patch export experience

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/patch-export-experience.py
      - .github/workflows/patch-export-experience.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-export-experience.py
      - .github/workflows/patch-export-experience.yml

permissions:
  contents: write

concurrency:
  group: patch-export-experience
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply export experience patch
        run: python scripts/patch-export-experience.py
      - name: Install dependencies
        run: npm ci
      - name: Validate export experience
        shell: bash
        run: |
          set -o pipefail
          npm run audit:export 2>&1 | tee export-patch.log
          npm run typecheck 2>&1 | tee -a export-patch.log
          npm run build 2>&1 | tee -a export-patch.log
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: export-patch-diagnostics-${{ github.run_id }}
          path: export-patch.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Commit source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/vite-env.d.ts src/app/Editor.tsx src/editor/InspectorV2.tsx src/editor/ExportDialog.tsx src/finalUx.css electron/main.cjs electron/preload.cjs scripts/audit-export.mjs package.json .github/workflows/ci.yml
          git commit -m "Add export settings dialog and completion notifications"
          git pull --rebase origin feature/prd-foundation-remotion
          git push origin HEAD:feature/prd-foundation-remotion
