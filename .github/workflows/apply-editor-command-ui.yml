name: Apply Editor Command UI

on:
  push:
    branches:
      - feat/editor-command-menu-ui

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/editor-command-menu-ui
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply deterministic editor UI patch
        run: |
          node scripts/apply-editor-command-ui.cjs
          node scripts/fix-editor-command-ui.cjs
      - name: Commit generated editor UI
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/Editor.tsx src/editor/MultiSceneCanvasStage.tsx src/editor/DesignToolsPanel.tsx src/ui/Icon.tsx src/main.tsx src/editor/EditorMenuBar.tsx
          git commit -m "fix: complete editor command UI integration"
          git push origin HEAD:feat/editor-command-menu-ui
