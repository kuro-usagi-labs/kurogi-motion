name: Patch shape library and templates

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/patch-shape-library.py
      - .github/workflows/patch-shape-library.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-shape-library.py

permissions:
  contents: write

concurrency:
  group: patch-shape-library
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply shape and template patch
        run: python scripts/patch-shape-library.py
      - name: Install dependencies
        run: npm ci
      - name: Validate shape and template foundations
        run: |
          npm run audit:shapes
          npm run audit:templates
          npm run typecheck
      - name: Commit source patch
        run: |
          git restore .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/core/project.ts src/core/shapeLibrary.ts src/ui/ShapeIcon.tsx src/MotionComposition.tsx src/renderer/LayerEffects.tsx src/app/Editor.tsx src/core/templateLayout.ts src/core/templateCatalog.ts src/finalUx.css scripts/audit-shapes.mjs package.json
          git commit -m "Expand vector shapes and refine template accents"
          git push origin HEAD:feature/prd-foundation-remotion
