name: Apply editor polish v3

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/apply-polish-v3.cjs
      - .github/workflows/apply-polish-v3.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
      - run: node scripts/apply-polish-v3.cjs
      - shell: bash
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/Editor.tsx src/editor/InspectorV2.tsx src/types.ts
          git commit -m "Integrate canvas, layer and MOV workflows"
          git push origin HEAD:feature/prd-foundation-remotion
