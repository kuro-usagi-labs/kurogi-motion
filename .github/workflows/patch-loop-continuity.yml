name: Patch loop continuity

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - scripts/patch-loop-continuity.mjs
      - .github/workflows/patch-loop-continuity.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-loop-continuity.mjs
      - .github/workflows/patch-loop-continuity.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Repair generated audit script quoting
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/patch-loop-continuity.mjs')
          text = path.read_text(encoding='utf-8')
          marker = 'const auditScript = `'
          start = text.index(marker) + len(marker)
          end_marker = '`;\nawait writeFile("scripts/audit-loops.mjs"'
          end = text.rindex(end_marker)
          segment = text[start:end]
          segment = segment.replace('`', '\\`').replace('${', '\\${')
          path.write_text(text[:start] + segment + text[end:], encoding='utf-8')
          PY
      - name: Apply patch
        shell: bash
        run: |
          set +e
          node scripts/patch-loop-continuity.mjs > patch-loop.log 2>&1
          status=$?
          cat patch-loop.log
          exit $status
      - name: Upload patch diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: loop-patch-diagnostics
          path: patch-loop.log
      - name: Commit source patch
        run: |
          git restore scripts/patch-loop-continuity.mjs .github/workflows/ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/core/evaluator.ts src/editor/InspectorV2.tsx scripts/audit-loops.mjs package.json
          git commit -m "Make loop animations enter from the base pose smoothly"
          git pull --rebase origin feature/prd-foundation-remotion
          git push origin HEAD:feature/prd-foundation-remotion
