name: Apply UI Cleanup

on:
  push:
    branches:
      - feat/ui-visibility-cleanup

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/ui-visibility-cleanup
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply deterministic UI cleanup
        run: node scripts/apply-ui-cleanup.cjs
      - name: Commit UI cleanup
        run: |
          if git diff --quiet; then
            echo "No generated changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/Editor.tsx src/editor/EditorMenuBar.tsx src/editor/InspectorV2.tsx src/editor/MultiSceneCanvasStage.tsx src/main.tsx
          git commit -m "feat: add configurable design toolbar and remove duplicate controls"
          git push origin HEAD:feat/ui-visibility-cleanup
