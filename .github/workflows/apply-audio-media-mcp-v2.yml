name: Apply Audio Media MCP V2

on:
  pull_request:
    branches:
      - feat/mcp-integration-v1
  push:
    branches:
      - feat/audio-media-mcp-v2

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/audio-media-mcp-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Repair generated patch syntax
        run: node scripts/fix-audio-generator-syntax.cjs
      - name: Apply deterministic integration patch
        shell: bash
        run: |
          set -o pipefail
          node scripts/apply-audio-media-mcp-v2.cjs 2>&1 | tee audio-patch.log
      - name: Refresh lockfile
        run: npm install --package-lock-only
      - name: Prepare generated integration
        run: |
          git checkout -- scripts/apply-audio-media-mcp-v2.cjs
          git diff --binary > audio-generated.patch
      - name: Upload generated integration
        uses: actions/upload-artifact@v4
        with:
          name: audio-generated-files-${{ github.run_id }}
          path: |
            .github/workflows/ci.yml
            electron/main.cjs
            electron/preload.cjs
            package.json
            package-lock.json
            src/MotionComposition.tsx
            src/app/Editor.tsx
            src/core/project.ts
            src/core/projectFiles.ts
            src/core/sceneWorkspace.ts
            src/editor/TimelineV3.tsx
            src/main.tsx
            src/types.ts
            src/ui/Icon.tsx
            src/vite-env.d.ts
            audio-generated.patch
            audio-patch.log
          if-no-files-found: error
          retention-days: 3
