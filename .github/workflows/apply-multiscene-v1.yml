name: Apply Multi-Scene V1

on:
  push:
    branches:
      - feat/infinite-canvas-multiscene-v1
    paths:
      - scripts/apply-multiscene-v1.cjs
      - .github/workflows/apply-multiscene-v1.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/infinite-canvas-multiscene-v1
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply integration patch
        run: node scripts/apply-multiscene-v1.cjs
      - name: Commit generated integration
        run: |
          if git diff --quiet; then
            echo "Integration already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/App.tsx src/app/Editor.tsx src/editor/MultiSceneCanvasStage.tsx src/main.tsx package.json .github/workflows/ci.yml
          git commit -m "feat: wire infinite canvas multi-scene workspace"
          git push origin HEAD:feat/infinite-canvas-multiscene-v1
