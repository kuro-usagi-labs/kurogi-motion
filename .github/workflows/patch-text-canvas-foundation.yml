name: Patch text and canvas foundation

on:
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/patch-text-canvas-foundation.py
      - .github/workflows/patch-text-canvas-foundation.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply foundation patch
        run: python scripts/patch-text-canvas-foundation.py
      - name: Install dependencies
        run: npm ci
      - name: Validate interaction foundations
        run: |
          npm run audit:text-canvas
          npm run typecheck
      - name: Commit source patch
        run: |
          git restore .github/workflows/patch-text-canvas-foundation.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/types.ts src/core/project.ts src/core/textLayout.ts src/editor/canvasMath.ts src/MotionComposition.tsx src/editor/CanvasStage.tsx src/editor/InspectorV2.tsx scripts/audit-text-canvas.mjs package.json .github/workflows/ci.yml
          git commit -m "Fix text box alignment and stabilize canvas zoom"
          git pull --rebase origin feature/prd-foundation-remotion
          git push origin HEAD:feature/prd-foundation-remotion
