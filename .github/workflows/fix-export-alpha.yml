name: Fix export alpha normalization

on:
  pull_request:
    branches:
      - main
    paths:
      - scripts/fix-export-alpha.py
      - .github/workflows/fix-export-alpha.yml
  push:
    branches:
      - feature/prd-foundation-remotion
    paths:
      - scripts/fix-export-alpha.py
      - .github/workflows/fix-export-alpha.yml

permissions:
  contents: write

concurrency:
  group: fix-export-alpha
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/prd-foundation-remotion
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Normalize export alpha state
        run: python scripts/fix-export-alpha.py
      - name: Install dependencies
        run: npm ci
      - name: Validate
        run: |
          npm run audit:export
          npm run typecheck
          npm run build
      - name: Commit source fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/Editor.tsx scripts/audit-export.mjs
          git commit -m "Normalize alpha options before export"
          git push origin HEAD:feature/prd-foundation-remotion
