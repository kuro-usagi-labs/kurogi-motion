name: Fix Audio Compiler

on:
  push:
    branches:
      - feat/audio-media-mcp-v2

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/audio-media-mcp-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Apply compiler fixes
        run: node scripts/fix-audio-compiler.cjs
      - name: Commit fixes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/Editor.tsx src/core/mcpCommands.ts src/editor/AnimationPresetDialog.tsx src/editor/TimelineV3.tsx
          git commit -m "fix: resolve audio and MCP V2 compiler errors"
          git push origin HEAD:feat/audio-media-mcp-v2
